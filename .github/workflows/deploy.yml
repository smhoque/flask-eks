name: Build and Deploy to EKS

on:
  push:
    branches:
      - master

env:
  ECR_REPOSITORY: flask-eks-app

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t flask-eks-app:${{ github.sha }} .

    - name: Tag Docker Image
      run: |
        docker tag flask-eks-app:${{ github.sha }} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-eks-app:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-eks-app:${{ github.sha }}

    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig \
        --name ${{ secrets.EKS_CLUSTER_NAME }} \
        --region ${{ secrets.AWS_REGION }}

    - name: Replace Image
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/flask-eks-app:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Deploy
      run: |
        kubectl apply -f k8s/
